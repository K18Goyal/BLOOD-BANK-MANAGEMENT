<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View All Users</title>
  <link rel="stylesheet" href="admin4.css">
</head>
<body>
  <div class="sidebar">
    <h1>Admin</h1>
    <ul>
      <li><a href="admin1.html">Dashboard</a></li>
      <li><a href="admin2.html">Manage Blood Request</a></li>
      <li><a href="admin3.html">Blood Inventory</a></li>
      <li><a href="admin4.html" class="active">View Users</a></li>
      <li><a href="admin5.html">Donation History</a></li>
      <li><a href="logout.html">Logout</a></li>
    </ul>
  </div>

  <div class="main-content">
    <h2>View All Users</h2>
    <p class="subtext">List of all donors and recipients registered in the system.</p>

    <table class="user-table">
      <thead>
        <tr>
          <th>Full Name</th>
          <th>Role</th>
          <th>Blood Type</th>
          <th>Contact</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        <!-- Fetched users will be inserted here -->
      </tbody>
    </table>
  </div>

  <script>
    function loadUsers() {
      fetch('http://127.0.0.1:5000/api/admin/all_users')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('user-table-body');
          tbody.innerHTML = '';
          data.users.forEach(user => {
            const tr = document.createElement('tr');
            const isDonor = user.role.toLowerCase() === 'donor';
            tr.innerHTML = `
              <td>${user.name}</td>
              <td>${user.role}</td>
              <td>${user.blood_group}</td>
              <td>${user.contact}</td>
              <td>${isDonor ? `<a href="admin5.html?user_id=${user.user_id}"><button class="btn">View Donations</button></a>` : '-'}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(error => {
          console.error('Error loading users:', error);
        });
    }

    loadUsers();
  </script>
</body>
</html>
