<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <link rel="stylesheet" href="register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="register-container">
    <div class="card">
      <h2>Create an Account</h2>
      <form id="registerForm">
        <label for="role">Register As:</label>
        <select id="role" name="role" required>
          <option value="">-- Select Role --</option>
          <option value="donor">Donor</option>
          <option value="recipient">Recipient</option>
        </select>

        <div class="common-fields">
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" required />

          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />

          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />
        </div>

        <div id="donor-fields" class="role-fields hidden">
          <label for="ageDonor">Age:</label>
          <input type="number" id="ageDonor" name="ageDonor" min="18" max="65" />

          <label for="bloodType">Blood Type:</label>
          <select id="bloodType" name="bloodType">
            <option value="">-- Select --</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>

          <label for="contactDonor">Contact:</label>
          <input type="text" id="contactDonor" name="contactDonor" placeholder="Phone or email" />
        </div>

        <div id="recipient-fields" class="role-fields hidden">
          <label for="ageRecipient">Age:</label>
          <input type="number" id="ageRecipient" name="ageRecipient" min="0" />

          <label for="hospital">Hospital Name:</label>
          <input type="text" id="hospital" name="hospital" />

          <label for="requiredUnits">Units Required:</label>
          <input type="number" id="requiredUnits" name="requiredUnits" min="1" />

          <label for="contactRecipient">Contact:</label>
          <input type="text" id="contactRecipient" name="contactRecipient" placeholder="Phone or email" />
        </div>

        <button type="submit">Register</button>
      </form>
    </div>
  </div>

  <script>
    const roleSelect = document.getElementById("role");
    const donorFields = document.getElementById("donor-fields");
    const recipientFields = document.getElementById("recipient-fields");

    roleSelect.addEventListener("change", () => {
      const role = roleSelect.value;
      donorFields.classList.add("hidden");
      recipientFields.classList.add("hidden");

      if (role === "donor") {
        donorFields.classList.remove("hidden");
      } else if (role === "recipient") {
        recipientFields.classList.remove("hidden");
      }
    });

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const role = roleSelect.value;

      if (!role) {
        alert("Please select a role.");
        return;
      }

      let age, blood_group, contact;

      if (role === "donor") {
        age = parseInt(document.getElementById("ageDonor").value) || null;
        blood_group = document.getElementById("bloodType").value;
        contact = document.getElementById("contactDonor").value.trim();
        if (!blood_group) {
          alert("Please select your blood group.");
          return;
        }
      } else if (role === "recipient") {
        age = parseInt(document.getElementById("ageRecipient").value) || null;
        blood_group = null; // or handle hospital logic if needed
        contact = document.getElementById("contactRecipient").value.trim();
      }

      if (!contact) {
        alert("Please enter contact information.");
        return;
      }

      try {
        // Step 1: Register user in Users table
        const userRes = await fetch("/api/register_user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, role })
        });

        if (!userRes.ok) {
          throw new Error("Failed to register user");
        }

        const userData = await userRes.json();
        const userId = userData.user_id;

        // Step 2: Register in Donors or Recipients table
        let endpoint = "";
        let body = { user_id: userId, name, age, contact };

        if (role === "donor") {
          endpoint = "/api/donor/register";
          body.blood_group = blood_group;
          body.last_donation = null; // or add field if you want
        } else if (role === "recipient") {
          endpoint = "/api/recipient/register";
          body.blood_group = blood_group || "O+"; // fallback if needed
          // You can also add hospital and units required here if needed
        }

        const roleRes = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (roleRes.ok) {
          alert("Registration successful!");
          window.location.href = "login.html"; // redirect to login or dashboard
        } else {
          alert("Failed to register as " + role);
        }
      } catch (err) {
        console.error("Registration error:", err);
        alert("Error occurred during registration.");
      }
    });
  </script>

  <style>
    .hidden {
      display: none;
    }
  </style>
</body>
</html>
